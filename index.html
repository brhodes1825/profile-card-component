<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta content="viewport" width="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/pmg" href="favicon-32x32.png">
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Kumbh+Sans:wght,YOPQ@100..900,300&display=swap" rel="stylesheet">
    <title>Profile Card</title>
  </head>
  <body>
    <div class="container">
      <div class="upper">
        <img class="wrapper" src="bg-pattern-card.svg">
      </div>
      <img class="picture" src="image-victor.jpg">
      <div class="lower">
        <div class="info">
          <div class="top">
            <p class="name">Victor Crest</p>
            <p class="age">26</p>
          </div>
          <div class="bottom">
            <p class="location">London</p>
          </div>
        </div>
        <div class="stats">
          <div class="stack1">
            <p class="numbers">80K</p>
            <p class="description">Followers</p>
          </div>
          <div class="stack2">
            <p class="numbers">803K</p>
            <p class="description">Likes</p>
          </div>
          <div class="stack3">
            <p class="numbers">1.4K</p>
            <p class="description">Photos</p>
          </div>
        </div>
      </div>
    </div>
  </body>
